<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
        <link rel="icon" href="Profile.png">
        <title>EXPERT-LEVEL RADIOLOGY</title>
    </head>

    <style>
        /*Responsive Header*/
        nav{
            padding: 2px;
            background: linear-gradient(to bottom, black, gray);
        }
        .trademark{
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .trademark .logo{
            color: white;
            font-size: 13px;
            font-family: 'Times New Roman', Times, serif;
            margin-left: 9px;
        }


        /*History Section*/
        .chat-history{
            background-color: #292828;
            width: 25.5%;
            height: 579px;
            border: 1px solid white;
            margin-left: -9px;
            margin-top: -7px;
        }
        .history-button{
            font-size: 14px;
            color: white;
            margin-left: 7px;
            margin-top: 23px;
            width: 30px;
            height: 30px;
            border: 1px solid white;
            border-radius: 20px;
            background-color: #292828;
            transition: all 0.4s ease;
        }
        .history-button:hover{
            background-color: #111;
            border: 1px solid black;
        }
        .chat-btn{
            font-size: 14px;
            color: white;
            margin-left: 7px;
            margin-top: 23px;
            width: 90%;
            height: 50px;
            border: 1px solid white;
            border-radius: 20px;
            background-color: #292828;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .chat-btn:hover{
            background-color: #111;
            border: 1px solid black;
        }
        .recent{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: 18px;
            margin-top: 10px;
            margin-left: 15px;
            margin-bottom: 15px;
            color: white;
        }
        .chat-current{
            margin-top: 10px;
            margin-left: 15px;
            color: white;
        }
        .message-current{
            margin-top: 5px;
            font-size: 15px;
            margin-left: 5px;
        }
        .history{
            margin-left: 15px;
            color: white;
            font-family: 'Times New Roman', Times, serif;
        }
        .history-container{
            overflow: scroll;
            width: 100%;
            height: 70%;
        }
        .history-container a{
            text-decoration: none;
            color: white;
        }
        .history-container::-webkit-scrollbar{
            background-color: #292828;
        }
        .history-container::-webkit-scrollbar-thumb{
            background-color: transparent;
            width: 40px;
            border-radius: 20px;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .history-container::-webkit-scrollbar-thumb:hover{
            background-color: gray;
        }
        .history-container::-webkit-scrollbar-corner{
            background-color: transparent;
        }

        /*Chat Section*/
        .chat-body{
            top: 0;
            bottom: 0;
            position: fixed;
            background-color: #111;
            width: 76%;
            height: 650px;
            margin-top: -7px;
            margin-left: 330px;
        }
        .chat-section{
            height: 480px; 
            position: relative;
            overflow-y: scroll;
        }
        .chat-section::-webkit-scrollbar,  .chat-section::-webkit-scrollbar-corner{
            background-color: transparent;
        }
        .chat-section::-webkit-scrollbar-thumb{
            background-color: transparent;
            width: 90px;
            padding: 3px;
            border-radius: 20px;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .chat-section::-webkit-scrollbar-thumb:hover{
            background-color: gray;
        }
        .chat-input{
            margin-top: 20px;
            border-radius: 20px;
            border: 1px solid lightgray;
            box-shadow: 0px 0px 2px 0px solid lightgray;
            width: 60%;
            height: 90px;
            padding: 10px;
            margin-left: 200px;
        }
        .text-message{
            border: 1px solid lightgray;
            padding: 9px;
            border-radius: 20px;
            width: 90%;
            color: white;
            height: 30px;
            margin-bottom: 10px;
            background-color: #292828;
        }
        .text-message::placeholder{
            margin-left: 70px;
            color: white;
        }
        .other-btn{
            width: 30px;
            background-color: #292828;
            color: white;
            height: 30px;
            border: 1px solid lightgray;
            border-radius: 20px;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .other-btn:hover{
            background-color: #111;
        }
        .send-btn{
            width: 30px;
            background-color: #292828;
            color: white;
            height: 30px;
            border: 1px solid lightgray;
            border-radius: 20px;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .send-btn:hover{
            background-color: #111;
        }
        .send-btn:disabled {
            background-color: #a5d6a7;
            cursor: not-allowed;
        }
        .model{
            float: right;
            width: 70px;
            background-color: #292828;
            color: white;
            height: 30px;
            border: 1px solid lightgray;
            border-radius: 20px;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .model:hover{
            background-color: #111;
        }
        .user-message, .bot-message{
            border: 1px solid gray;
            margin-left: 30px;
            width: 700px;
            margin-bottom: 30px;
            padding: 2px;
            background-color: #292828;
            color: white;
            height: auto;
        }
        .user-message{
            background-color: #4caf50;
            color: white;
            align-self: flex-end;
            margin-right: 30px;
            border-top-left-radius: 15px;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }
        .bot-message{
            align-self: flex-start;
            background-color: #292828;
            border-top-right-radius: 15px;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }
        #chatbox {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        /* ... existing CSS ... */
        #mic-btn { 
            transition: all 0.3s;
        }
        /* Pulsating effect when recording */
        #mic-btn.active {
            background-color: #ff5e6d;
            box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        /*Media Query*/
        @media (max-width:900px) {
            .chat-body{
                width: 76%;
                position: absolute;
                right: -1%;
            }
            nav{
                width: 25%;
                font-size: 4px;
            }
            .chat-history{
                height: 590px;
                width: 29%;
            }
            .recent, .message-current, .history{
                font-size: 13px;
            }
            .chat-btn{
                font-size: 10px;
                margin-left: 0px;
                margin-top: 23px;
                width: 90%;
                height: 20px;
            }
            .trademark .logo{
                font-size: 9px;
                margin-left: 2px;
                text-align: center;
            }
            .user-message, .bot-message{
                width: 500px;
                font-size: 10px;
            }
            .bot-message{
                margin-left: 5px;
            }
            .user-message{
                margin-right: 5px;
            }
            .chat-input{
                margin-left: 20px;
                width: 80%;
            }
            .text-message{
                width: 92%;
            }
        }
        @media (max-width: 1000px) {
            .chat-body{
                height: 1000px;
            }
            .chat-history{
                height: 1000px;
            }
        }

    </style>

    <body>
        <!--History Section--> 
        <nav>
            <div class="trademark">
                <div class="logo">EXPERT-LEVEL RADIOLOGY REPORT GENERATOR</div>
            </div>
        </nav>

        <div class="chat-history" id="chat-history">
            <div style="margin-left: 15px;"><button type="submit" class="chat-btn" id="new-chat"><i class="fa-regular fa-message"></i> New Chat</button></div>
            <div class="chat-current" id="chat-current">
                <div class="message-current" id="message-current"></div>
            </div>
            
            <p class="recent">Recent</p>
            <div class="history-container" id="history-sidebar">
                <div id="history-list">
                    <p class="history">No History Yet...</p>
                </div>
            </div>
        </div>

        <!--Chat Section-->
        <div class="chat-body" id="chat-body">
            <div class="chat-section" >
                <div style="margin-top: 30px;">
                    <div id="chatbox">
                        <div class="message bot-message">Hello! How can I assist you today?</div>
                    </div>
                </div>
            </div>

            <div class="chat-input">
                <div>
                    <input type="text" id="text-message" class="text-message" placeholder="Search..." required>
                    <button type="button" id="send-btn" class="send-btn" onclick="sendMessage()" style="font-size: 10px; float: right; margin-top:2px;"><i class="fas fa-paper-plane"></i></button>
                </div>

                <div>
                    <button type="submit" class="other-btn" id="mic-btn"><i class="fas fa-microphone" style="font-size: 11px;"></i></button>
                    <button type="submit" class="other-btn" id="image-upload-btn"><i class="fas fa-paperclip" style="font-size: 11px;"></i></button>
                    <button type="submit" class="other-btn" id="extract-btn" onclick="extractDataAgent()"><i class="fa-regular fa-clipboard" style="font-size: 11px;"></i></button><!--extractData()-->
                    <button type="submit" class="other-btn" id="report-btn" onclick="generateReportAgent()"><i class="fa-regular fa-hospital" style="font-size: 11px;"></i></button><!--generateReport()-->
                    <input type="file" id="image-input" accept="image/png, image/jpeg" style="display: none; margin-left: 150px;">
                </div>
            </div>
        </div>

        <script>
            // ====================================================================
            // 1. GLOBAL VARIABLES AND CONFIG
            // ====================================================================
            const API_BASE_URL = 'window.location.origin'; 
            const STORAGE_KEY = 'radiology_chat_history';
            const MAX_SLOTS = 11;

            // --- Core UI Elements ---
            const input = document.getElementById('text-message');
            const sendButton = document.getElementById('send-btn');
            const chatbox = document.getElementById('chatbox');
            const historyList = document.getElementById('history-list');
            const newChatBtn = document.getElementById('new-chat');
            const micButton = document.getElementById('mic-btn');
            const imageUploadButton = document.getElementById('image-upload-btn');
            const imageInput = document.getElementById('image-input');
            const reportButton = document.getElementById('report-btn');
            const extractButton = document.getElementById('extract-btn');

            // --- State Variables ---
            let currentSessionId = Date.now().toString();
            let isNewSession = true;
            let isSending = false;
            let uploadedImageFile = null; 

            // ====================================================================
            // 2. HELPERS & RENDERING
            // ====================================================================
            function formatMessage(text) {
                return text
                    .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/\n/g, '<br>')
                    .replace(/^- (.*)$/gm, '<li>$1</li>');
            }

            function addMessageToChatbox(content, type) {
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message', `${type}-message`);
                msgDiv.innerHTML = `<div class="content">${formatMessage(content)}</div>`;
                chatbox.appendChild(msgDiv);
                chatbox.scrollTo({ top: chatbox.scrollHeight, behavior: 'smooth' });
                return msgDiv;
            }

            function displayGeneratedImage(imageUrl) {
                // 1. Fix the URL concatenation to prevent "localhost:5000output/..."
                const cleanImagePath = imageUrl.startsWith('/') ? imageUrl.substring(1) : imageUrl;
                const fullUrl = imageUrl.startsWith('http') ? imageUrl : `${API_BASE_URL}/${cleanImagePath}`;
                
                const wrapper = document.createElement('div');
                wrapper.classList.add('message', 'bot-message', 'image-container');
                
                const imgElement = document.createElement('img');
                imgElement.src = fullUrl;
                imgElement.alt = "Medical Vis";
                imgElement.style.maxWidth = "100%";
                imgElement.style.borderRadius = "8px";
                imgElement.style.marginTop = "10px";
                imgElement.style.cursor = "pointer";

                // Add an error logger to see exactly what URL failed
                imgElement.onerror = () => console.error("Failed to load image from:", fullUrl);
                
                // 2. Scroll only AFTER the image is fully loaded
                imgElement.onload = () => {
                    chatbox.scrollTo({ top: chatbox.scrollHeight, behavior: 'smooth' });
                };

                imgElement.onclick = () => window.open(fullUrl, '_blank');

                wrapper.appendChild(imgElement);
                chatbox.appendChild(wrapper);
            }

            function getAllSessions() {
                // This part is perfect, no changes needed.
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            }

            // ====================================================================
            // 3. UPDATED HISTORY & SESSION LOGIC
            // ====================================================================
            function handleSessionSaving(userQuestion, botReply) {
                const sessions = getAllSessions();
                
                if (isNewSession) {
                    let cleanTitle = userQuestion.replace(/Please generate a professional.*?:\s*/i, "");
                    cleanTitle = cleanTitle.replace(/Extract clinical data.*?:\s*/i, "");
                    cleanTitle = cleanTitle.substring(0, 30) + (cleanTitle.length > 30 ? "..." : "");
                    
                    sessions[currentSessionId] = {
                        id: currentSessionId,
                        title: cleanTitle || "New Consultation",
                        timestamp: Date.now(),
                        html: "" 
                    };
                    isNewSession = false;
                }

                if (sessions[currentSessionId]) {
                    sessions[currentSessionId].html = chatbox.innerHTML;
                    sessions[currentSessionId].timestamp = Date.now(); 
                }

                const keys = Object.keys(sessions).sort((a,b) => sessions[b].timestamp - sessions[a].timestamp);
                if (keys.length > MAX_SLOTS) {
                    for (let i = MAX_SLOTS; i < keys.length; i++) {
                        delete sessions[keys[i]];
                    }
                }

                localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
                renderHistoryUI();
            }

            function renderHistoryUI() {
                const sessions = Object.values(getAllSessions()).sort((a, b) => b.timestamp - a.timestamp);
                historyList.innerHTML = '';

                if (sessions.length === 0) {
                    historyList.innerHTML = '<p class="history" style="padding:15px; color:#888;">No History Yet...</p>';
                    return;
                }

                sessions.forEach(session => {
                    const item = document.createElement('div');
                    item.className = `history-item ${session.id === currentSessionId ? 'active' : ''}`;
                    item.innerHTML = `
                        <div class="history-content" style="padding: 10px; cursor: pointer;">
                            <span class="chat-title" style="color: white; display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">
                                ${session.title}
                            </span>
                            <small style="color: #888; font-size: 0.8em;">
                                ${new Date(session.timestamp).toLocaleDateString()} ${new Date(session.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                            </small>
                        </div>
                    `;

                    item.onclick = () => {
                        currentSessionId = session.id;
                        isNewSession = false; 
                        chatbox.innerHTML = session.html;
                        renderHistoryUI(); 
                        chatbox.scrollTop = chatbox.scrollHeight;
                    };
                    historyList.appendChild(item);
                });
            }

            // ====================================================================
            // 4. CORE CHAT LOGIC (With Image Fixes)
            // ====================================================================
            imageUploadButton.addEventListener('click', () => imageInput.click());

            imageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    uploadedImageFile = file;
                    const msg = addMessageToChatbox(`📎 Ready to upload: ${file.name}`, 'user');
                    msg.style.opacity = "0.7"; 
                }
            });

            async function sendMessage(userInput = null, contextPrefix = "") {
                if (isSending) return;
                
                const rawText = userInput || input.value.trim();
                // Logic check: Allow sending if there's text OR an image file
                if (!rawText && !uploadedImageFile) return;

                isSending = true;
                let finalMessage = contextPrefix + rawText;
                
                if (rawText) addMessageToChatbox(rawText, 'user');
                input.value = '';
                
                const loadingDiv = addMessageToChatbox("Thinking...", 'bot');
                loadingDiv.classList.add('loading-indicator');

                try {
                    // --- 1. Handling Image Upload ---
                    if (uploadedImageFile) {
                        loadingDiv.innerHTML = '<div class="content">Uploading medical scan...</div>';
                        const formData = new FormData();
                        formData.append('file', uploadedImageFile);

                        const uploadResponse = await fetch(`${API_BASE_URL}/api/upload`, {
                            method: 'POST',
                            body: formData
                        });

                        if (!uploadResponse.ok) throw new Error("Image upload failed");
                        const uploadData = await uploadResponse.json();
                        
                        // Note: Clear these BEFORE the next fetch to prevent accidental double-uploads
                        uploadedImageFile = null;
                        imageInput.value = ""; 
                        
                        finalMessage += `\n\n[SYSTEM: The user has uploaded an image for analysis at this path: ${uploadData.filepath}]`;
                    }

                    // --- 2. Requesting AI Response ---
                    loadingDiv.innerHTML = '<div class="content">Analyzing findings...</div>';
                    
                    const response = await fetch(`${API_BASE_URL}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: finalMessage })
                    });

                    if (!response.ok) throw new Error(`Server error: ${response.status}`);

                    const data = await response.json();
                    
                    // Safety check before removing
                    if (loadingDiv && loadingDiv.parentNode) {
                        chatbox.removeChild(loadingDiv);
                    }

                    let botReply = data.reply || "No response.";

                    // --- 3. REFINED IMAGE DETECTION & CLEANUP ---
                    // This regex specifically finds Markdown images ![]() OR raw URLs
                    const markdownImageRegex = /!\[.*?\]\((https?:\/\/[^\s)]+\.(?:png|jpg|jpeg|gif))\)/i;
                    const rawUrlRegex = /(https?:\/\/[^\s)]+\.(?:png|jpg|jpeg|gif))/i;

                    let imageUrl = null;
                    let match = botReply.match(markdownImageRegex);

                    if (match) {
                        imageUrl = match[1]; // Get the URL from inside the ![]()
                        botReply = botReply.replace(match[0], '').trim(); // Remove the entire ![]() part
                    } else {
                        match = botReply.match(rawUrlRegex);
                        if (match) {
                            imageUrl = match[0];
                            botReply = botReply.replace(imageUrl, '').trim(); // Remove raw URL
                        }
                    }

                    // Display the text (if anything is left after removing the image link)
                    if (botReply) {
                        addMessageToChatbox(botReply, 'bot');
                    }

                    // Display the image if we found a URL
                    if (imageUrl) {
                        displayGeneratedImage(imageUrl);
                    }

                    handleSessionSaving(rawText, botReply);

                } catch (error) {
                    if (loadingDiv && loadingDiv.parentNode) {
                        chatbox.removeChild(loadingDiv);
                    }
                    console.error("Critical Error:", error);
                    addMessageToChatbox(`Error: ${error.message}`, 'bot');
                } finally {
                    isSending = false;
                    // Small delay to ensure the UI is ready for focus
                    setTimeout(() => input.focus(), 10);
                }
            }

            // ====================================================================
            // 5. EVENT LISTENERS (Preventing Refresh)
            // ====================================================================

            newChatBtn.addEventListener('click', (e) => {
                e.preventDefault();
                currentSessionId = Date.now().toString();
                isNewSession = true;
                chatbox.innerHTML = '<div class="message bot-message"><div class="content">New session started. How can I help?</div></div>';
                renderHistoryUI();
            });

            sendButton.addEventListener('click', (e) => {
                e.preventDefault(); 
                sendMessage();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            reportButton.addEventListener('click', (e) => {
                e.preventDefault();
                if(!input.value.trim()) return addMessageToChatbox("Enter findings first.", 'bot');
                sendMessage(input.value.trim(), "Please generate a professional radiology report for: ");
                const patient = prompt("Patient info (e.g., 'John Doe, Male, 45 years old'):");
                const findings = input.value;
                sendMessage(`${patient} ${findings}`, "Generate full radiology report for ");
            });

            extractButton.addEventListener('click', (e) => {
                e.preventDefault();
                if(!input.value.trim()) return addMessageToChatbox("Enter text first.", 'bot');
                sendMessage(input.value.trim(), "Extract clinical data to JSON from: ");
            });

            document.addEventListener('DOMContentLoaded', renderHistoryUI);

            // Speech Recognition
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.continuous = false;
                recognition.onresult = (event) => {
                    input.value = event.results[0][0].transcript;
                    micButton.classList.remove('active');
                };
                recognition.onend = () => micButton.classList.remove('active');
                micButton.addEventListener('click', () => {
                    if (micButton.classList.contains('active')) recognition.stop();
                    else {
                        micButton.classList.add('active');
                        recognition.start();
                    }
                });
            } else {
                micButton.style.display = 'none';
            }
        </script>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/js/all.min.js" integrity="sha512-gBYquPLlR76UWqCwD06/xwal4so02RjIR0oyG1TIhSGwmBTRrIkQbaPehPF8iwuY9jFikDHMGEelt0DtY7jtvQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    </body>
</html>
